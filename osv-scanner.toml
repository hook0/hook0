# Configuration for github.com/google/osv-scanner
#
# Documented ignores for advisories where a version bump is not viable today.
# Each entry MUST include a reason and SHOULD include an ignoreUntil date so we
# get reminded to re-evaluate. When the underlying crate gets a fix or a viable
# replacement, drop the corresponding entry.

[[IgnoredVulns]]
id = "RUSTSEC-2024-0436"
ignoreUntil = "2026-12-31"
reason = """
paste 1.0.15 is unmaintained but only pulled transitively by
tikv-jemalloc-ctl (jemalloc feature on hook0-api) and pprof_util
(profiling feature, disabled by default). No first-party code uses
paste. Migration to pastey (drop-in fork) depends on tikv-jemallocator
upstream — tracked at https://github.com/tikv/jemallocator/issues
"""

[[IgnoredVulns]]
id = "RUSTSEC-2023-0071"
ignoreUntil = "2026-12-31"
reason = """
rsa 0.9.10 Marvin attack timing sidechannel only affects code that
performs RSA decryption with PKCS#1 v1.5 padding. The crate is in
Cargo.lock via sqlx-mysql, which we do NOT compile (hook0 only enables
the postgres feature of sqlx). `cargo tree -i rsa` returns "nothing to
print" — confirming no compile-time pull. False positive for this
codebase.
"""

