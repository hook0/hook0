include:
  - component: $CI_SERVER_HOST/CleverCloud/clever-cloud-pipeline/deploy-to-prod@2.0.3
    inputs:
      stage: release
      environment: staging
      step_name: deploy output_worker to staging
      app_id: $CLEVERCLOUD_STAGING_OUTPUT_WORKER_ID
      when: manual
  - component: $CI_SERVER_HOST/CleverCloud/clever-cloud-pipeline/deploy-to-prod@2.0.3
    inputs:
      stage: release
      environment: production
      step_name: deploy output_worker to production
      app_id: $CLEVERCLOUD_PRODUCTION_OUTPUT_WORKER_ID
      when: manual

output_worker.check:
  extends: .rust-cache-pull-only
  stage: test
  dependencies: []
  image: $PROXY/rust:$RUST_VERSION
  rules:
    # Always run on release tags (including pre-releases)
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-(?:alpha|beta|rc)(?:\.\d+)?)?$/
    - changes:
        - output-worker/**/*
        - sentry-integration/**/*
        - Cargo.*
  variables:
    SQLX_OFFLINE: "true"
  services:
    - $PROXY/postgres:$PG_VERSION
  before_script:
    - rustc --version && cargo --version
    - rustup component add clippy rustfmt
    - !reference [.protoc-setup, before_script]
  script:
    - pushd output-worker
    - cargo fmt --all -- --check
    - cargo clippy --all-targets --all-features -- -D warnings
    - cargo test
    - popd
