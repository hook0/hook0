# =============================================================================
# Test Stage
# =============================================================================

cli.check:
  stage: test
  image: rust:$RUST_VERSION
  extends: .rust-cache-pull-only
  needs:
    - job: api-integration-tests.build
      artifacts: true
  rules:
    - changes:
        - cli/**/*
        - api/**/*
        - Cargo.*
  services:
    - name: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/postgres:$PG_VERSION
      alias: postgres
  variables:
    ## PostgreSQL
    POSTGRES_DB: hook0
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    ## API configuration
    DATABASE_URL: "postgres://postgres:postgres@postgres:5432/hook0"
    SMTP_CONNECTION_URL: "smtp://localhost:1025"
    EMAIL_SENDER_ADDRESS: "noreply@hook0.local"
    APP_URL: "http://localhost:8080/"
    BISCUIT_PRIVATE_KEY: "bee97db5398b2694cc2362918a2d9eed117b70f036e224407085ccb6800028fc"
    MASTER_API_KEY: "00000000-0000-0000-0000-000000000000"
    DISABLE_TARGET_IP_CHECK: "true"
    DISABLE_SERVING_WEBAPP: "true"
    HEALTH_CHECK_KEY: ""
    DISABLE_API_RATE_LIMITING: "true"
  before_script:
    - rustc --version && cargo --version
    - rustup component add clippy rustfmt
    # Install Node.js for the provisioning script
    - curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
    - apt-get install -y nodejs
  script:
    # Static checks (no API needed)
    - pushd cli
    - cargo fmt --check
    - cargo clippy -- -D warnings
    - popd
    # Start the API binary in background
    - chmod +x target/release/hook0-api
    - target/release/hook0-api &
    # Wait for API readiness
    - |
      echo "Waiting for API to be ready..."
      for i in $(seq 1 30); do
        if curl -sf http://localhost:8080/api/v1/health -o /dev/null 2>&1; then
          echo "API is ready!"
          break
        fi
        echo "Waiting for API... ($i/30)"
        sleep 2
        if [ $i -eq 30 ]; then
          echo "ERROR: API failed to start within timeout"
          exit 1
        fi
      done
    # Provision test data
    - pushd cli/tests
    - npm install --no-package-lock pg
    - eval "$(node ci-setup.mjs)"
    - popd
    # Run all tests including E2E
    - pushd cli
    - cargo test --all-features -- --include-ignored

# =============================================================================
# Build Stage - Cross-compilation matrix
# =============================================================================

.cli-build-template:
  stage: build
  extends: .rust-cache-pull-only
  script:
    - cd cli
    - rustup target add $TARGET || true
    - cargo build --release --target $TARGET
    - mkdir -p ../dist
    - cp target/$TARGET/release/hook0$SUFFIX ../dist/hook0-$ARTIFACT_NAME
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

cli.build:linux-amd64:
  extends: .cli-build-template
  image: rust:$RUST_VERSION
  variables:
    TARGET: x86_64-unknown-linux-gnu
    SUFFIX: ""
    ARTIFACT_NAME: linux-amd64

cli.build:linux-arm64:
  extends: .cli-build-template
  image: rust:$RUST_VERSION
  variables:
    TARGET: aarch64-unknown-linux-gnu
    SUFFIX: ""
    ARTIFACT_NAME: linux-arm64
    CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
  before_script:
    - apt-get update && apt-get install -y gcc-aarch64-linux-gnu

cli.build:darwin-amd64:
  extends: .cli-build-template
  tags:
    - macos
  variables:
    TARGET: x86_64-apple-darwin
    SUFFIX: ""
    ARTIFACT_NAME: darwin-amd64
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: true

cli.build:darwin-arm64:
  extends: .cli-build-template
  tags:
    - macos-arm64
  variables:
    TARGET: aarch64-apple-darwin
    SUFFIX: ""
    ARTIFACT_NAME: darwin-arm64
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: true

cli.build:windows-amd64:
  extends: .cli-build-template
  image: rust:$RUST_VERSION
  variables:
    TARGET: x86_64-pc-windows-gnu
    SUFFIX: ".exe"
    ARTIFACT_NAME: windows-amd64.exe
  before_script:
    - apt-get update && apt-get install -y mingw-w64
    - rustup target add x86_64-pc-windows-gnu

