# Website build and deployment to Netlify
# Production: pushes to master branch
# MR Preview: merge request events
# Immutable build: single build artifact used for both production and preview

website.build:
  stage: build
  dependencies: []
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      changes:
        - website/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - website/**/*
  image: node:$NODE_VERSION
  timeout: 15 minutes
  variables:
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
    RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"
  before_script:
    # Rust toolchain for the build-i18n orchestrator + i18n-gate (std-only,
    # no transitive deps → first install ~30s, then cached). Skip if cached.
    - |
      if ! command -v cargo >/dev/null; then
        export PATH="$CARGO_HOME/bin:$PATH"
        if ! command -v cargo >/dev/null; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
        fi
      fi
    - export PATH="$CARGO_HOME/bin:$PATH"
    - cargo --version
  script:
    - cd website/
    - npm ci
    - npm run build
    - npm run check:i18n
  cache:
    key: ${CI_COMMIT_REF_SLUG}-website
    paths:
      - .npm
      - .cargo/
      - .rustup/
      - website/node_modules/
      - website/.parcel-cache/
      - website/scripts/build-i18n/target/
      - website/scripts/i18n-gate/target/
  artifacts:
    paths:
      - website/dist
    expire_in: 1 week

# Production deployment to Netlify (master branch)
website.deploy:
  stage: release
  image: node:$NODE_VERSION
  needs:
    - job: website.build
      artifacts: true
  script:
    - npm install -g netlify-cli
    - netlify deploy --dir=website/dist --site="$NETLIFY_WEBSITE_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN" --prod --message="Deploy from $CI_COMMIT_SHORT_SHA"
  environment:
    name: production-website
    url: https://www.hook0.com
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      changes:
        - website/**/*

# Preview deployment to Netlify (MR)
website.deploy.preview:
  stage: release
  image: node:$NODE_VERSION
  needs:
    - job: website.build
      artifacts: true
  script:
    - npm install -g netlify-cli
    - netlify deploy --dir=website/dist --site="$NETLIFY_WEBSITE_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN" --json --message="Preview MR-$CI_MERGE_REQUEST_IID" > deploy_output.json
    - cat deploy_output.json
    - node -e "const d=require('./deploy_output.json'); console.log('DEPLOY_URL=' + d.deploy_url);" > deploy.env
    - cat deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
  environment:
    name: preview/website-$CI_MERGE_REQUEST_IID
    url: $DEPLOY_URL
    auto_stop_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - website/**/*
