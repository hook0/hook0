frontend.build:
  stage: build
  dependencies: []
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-(?:alpha|beta|rc)(?:\.\d+)?)?$/
    - changes:
        - tests-e2e/**/*
        - frontend/**/*
        - api/**/*
        - output-worker/**/*
  image: $PROXY/node:$NODE_VERSION
  variables:
    # API endpoint for E2E tests - must match the port used in tests-e2e/.gitlab-ci.yml
    VITE_API_ENDPOINT: "http://localhost:8081/api/v1"
  script:
    - pushd frontend/
    - npm ci
    - npm run build
  artifacts:
    name: "$CI_BUILD_NAME"
    paths:
      - frontend/dist/
    expire_in: 1 week

frontend.check:
  stage: test
  dependencies: []
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-(?:alpha|beta|rc)(?:\.\d+)?)?$/
    - changes:
        - frontend/**/*
  image: $PROXY/node:$NODE_VERSION
  before_script:
    - cd frontend && npm ci
  script:
    - npm run check
    - npm run lint
