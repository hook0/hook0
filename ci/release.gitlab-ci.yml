.release-rules:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

.build-binary:
  extends: .release-rules
  stage: build
  image: rust:latest
  variables:
    SQLX_OFFLINE: "true"
  before_script:
    - rustup target add $TARGET
    - apt-get update && apt-get install -y protobuf-compiler cmake $CROSS_DEPS
  artifacts:
    paths:
      - artifacts/
    expire_in: 1 week

# --- API Builds ---

# TODO: REVERT - temporairement en ARM pour test local
release.build-api-x86_64:
  extends: .build-binary
  variables:
    TARGET: aarch64-unknown-linux-gnu
    CROSS_DEPS: ""
  script:
    - mkdir -p artifacts
    - cargo build --release --package hook0-api --target $TARGET
    - cp target/$TARGET/release/hook0-api artifacts/hook0-api-x86_64-linux

release.build-api-aarch64:
  extends: .build-binary
  variables:
    TARGET: aarch64-unknown-linux-gnu
    CROSS_DEPS: "gcc-aarch64-linux-gnu libc6-dev-arm64-cross"
  script:
    - mkdir -p artifacts
    - export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
    - cargo build --release --package hook0-api --target $TARGET
    - cp target/$TARGET/release/hook0-api artifacts/hook0-api-aarch64-linux

release.build-api-armv7:
  extends: .build-binary
  variables:
    TARGET: armv7-unknown-linux-gnueabihf
    CROSS_DEPS: "gcc-arm-linux-gnueabihf libc6-dev-armhf-cross"
  script:
    - mkdir -p artifacts
    - export CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc
    - cargo build --release --package hook0-api --target $TARGET
    - cp target/$TARGET/release/hook0-api artifacts/hook0-api-armv7-linux

# --- Worker Builds ---

# TODO: REVERT - temporairement en ARM pour test local
release.build-worker-x86_64:
  extends: .build-binary
  variables:
    TARGET: aarch64-unknown-linux-gnu
    CROSS_DEPS: ""
  script:
    - mkdir -p artifacts
    - cargo build --release --package hook0-output-worker --target $TARGET
    - cp target/$TARGET/release/hook0-output-worker artifacts/hook0-output-worker-x86_64-linux

release.build-worker-aarch64:
  extends: .build-binary
  variables:
    TARGET: aarch64-unknown-linux-gnu
    CROSS_DEPS: "gcc-aarch64-linux-gnu libc6-dev-arm64-cross"
  script:
    - mkdir -p artifacts
    - export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
    - cargo build --release --package hook0-output-worker --target $TARGET
    - cp target/$TARGET/release/hook0-output-worker artifacts/hook0-output-worker-aarch64-linux

release.build-worker-armv7:
  extends: .build-binary
  variables:
    TARGET: armv7-unknown-linux-gnueabihf
    CROSS_DEPS: "gcc-arm-linux-gnueabihf libc6-dev-armhf-cross"
  script:
    - mkdir -p artifacts
    - export CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc
    - cargo build --release --package hook0-output-worker --target $TARGET
    - cp target/$TARGET/release/hook0-output-worker artifacts/hook0-output-worker-armv7-linux

# --- Frontend Build ---

release.build-frontend:
  extends: .release-rules
  stage: build
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run build
    - cd ..
    - mkdir -p artifacts
    - tar -czf artifacts/frontend-dist.tar.gz -C frontend dist
  artifacts:
    paths:
      - artifacts/
    expire_in: 1 week

# --- Changelog Extraction ---

release.extract-notes:
  extends: .release-rules
  stage: build
  image: alpine:latest
  before_script:
    - apk add --no-cache curl git
    - curl -L https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-musl.tar.gz | tar xz
    - mv git-cliff-*/git-cliff /usr/local/bin/
  script:
    - mkdir -p artifacts
    - git-cliff --current --strip header > artifacts/RELEASE_NOTES.md
    - echo "--- Release notes for $CI_COMMIT_TAG ---"
    - cat artifacts/RELEASE_NOTES.md
  artifacts:
    paths:
      - artifacts/RELEASE_NOTES.md
    expire_in: 1 week

# --- Containers ---

release.containers:
  extends: .release-rules
  stage: release
  image: docker:latest
  services:
    - docker:dind
  needs:
    - job: release.build-api-x86_64
      artifacts: true
    - job: release.build-api-aarch64
      artifacts: true
    - job: release.build-worker-x86_64
      artifacts: true
    - job: release.build-worker-aarch64
      artifacts: true
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    VERSION: ${CI_COMMIT_TAG#v}
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
    - docker login ghcr.io -u "$GITHUB_USERNAME" -p "$GITHUB_TOKEN"
    - docker buildx create --use --name multiarch --driver docker-container
  script:
    # Prepare build context for API (rename to match TARGETARCH logic)
    - mkdir -p build-context/api
    - cp artifacts/hook0-api-x86_64-linux build-context/api/hook0-api-amd64-linux
    - cp artifacts/hook0-api-aarch64-linux build-context/api/hook0-api-arm64-linux
    - cp api/Dockerfile.release build-context/api/Dockerfile

    # Prepare build context for Worker
    - mkdir -p build-context/worker
    - cp artifacts/hook0-output-worker-x86_64-linux build-context/worker/hook0-output-worker-amd64-linux
    - cp artifacts/hook0-output-worker-aarch64-linux build-context/worker/hook0-output-worker-arm64-linux
    - cp output-worker/Dockerfile.release build-context/worker/Dockerfile

    # Build and push API
    - |
      docker buildx build --platform linux/amd64,linux/arm64 \
        --tag "$CI_REGISTRY_IMAGE/hook0-api:$VERSION" \
        --tag "$CI_REGISTRY_IMAGE/hook0-api:latest" \
        --tag "rbaumier/hook0-api:$VERSION" \
        --tag "rbaumier/hook0-api:latest" \
        --tag "ghcr.io/rbaumier/hook0-api:$VERSION" \
        --tag "ghcr.io/rbaumier/hook0-api:latest" \
        --push \
        build-context/api

    # Build and push Output Worker
    - |
      docker buildx build --platform linux/amd64,linux/arm64 \
        --tag "$CI_REGISTRY_IMAGE/output-worker:$VERSION" \
        --tag "$CI_REGISTRY_IMAGE/output-worker:latest" \
        --tag "rbaumier/output-worker:$VERSION" \
        --tag "rbaumier/output-worker:latest" \
        --tag "ghcr.io/rbaumier/output-worker:$VERSION" \
        --tag "ghcr.io/rbaumier/output-worker:latest" \
        --push \
        build-context/worker

# --- Releases ---

release.gitlab:
  extends: .release-rules
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: release.extract-notes
      artifacts: true
    - job: release.build-api-x86_64
      artifacts: true
    - job: release.build-api-aarch64
      artifacts: true
    - job: release.build-api-armv7
      artifacts: true
    - job: release.build-worker-x86_64
      artifacts: true
    - job: release.build-worker-aarch64
      artifacts: true
    - job: release.build-worker-armv7
      artifacts: true
    - job: release.build-frontend
      artifacts: true
    - job: release.containers
  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: ./artifacts/RELEASE_NOTES.md
    assets:
      links:
        # Binaries
        - name: "hook0-api-x86_64-linux"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/hook0-api-x86_64-linux?job=release.build-api-x86_64"
          link_type: package
        - name: "hook0-api-aarch64-linux"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/hook0-api-aarch64-linux?job=release.build-api-aarch64"
          link_type: package
        - name: "hook0-api-armv7-linux"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/hook0-api-armv7-linux?job=release.build-api-armv7"
          link_type: package
        - name: "hook0-output-worker-x86_64-linux"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/hook0-output-worker-x86_64-linux?job=release.build-worker-x86_64"
          link_type: package
        - name: "hook0-output-worker-aarch64-linux"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/hook0-output-worker-aarch64-linux?job=release.build-worker-aarch64"
          link_type: package
        - name: "hook0-output-worker-armv7-linux"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/hook0-output-worker-armv7-linux?job=release.build-worker-armv7"
          link_type: package
        - name: "frontend-dist.tar.gz"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/frontend-dist.tar.gz?job=release.build-frontend"
          link_type: package
        # Docker images
        - name: "Docker: rbaumier/hook0-api"
          url: "https://hub.docker.com/r/rbaumier/hook0-api"
          link_type: image
        - name: "Docker: rbaumier/output-worker"
          url: "https://hub.docker.com/r/rbaumier/output-worker"
          link_type: image
        - name: "GHCR: ghcr.io/rbaumier/hook0-api"
          url: "https://ghcr.io/rbaumier/hook0-api"
          link_type: image
        - name: "GHCR: ghcr.io/rbaumier/output-worker"
          url: "https://ghcr.io/rbaumier/output-worker"
          link_type: image

release.github:
  extends: .release-rules
  stage: release
  image: alpine:latest
  needs:
    - job: release.extract-notes
      artifacts: true
    - job: release.build-api-x86_64
      artifacts: true
    - job: release.build-api-aarch64
      artifacts: true
    - job: release.build-api-armv7
      artifacts: true
    - job: release.build-worker-x86_64
      artifacts: true
    - job: release.build-worker-aarch64
      artifacts: true
    - job: release.build-worker-armv7
      artifacts: true
    - job: release.build-frontend
      artifacts: true
    - job: release.containers
  variables:
    GH_TOKEN: $GITHUB_TOKEN
    VERSION: ${CI_COMMIT_TAG#v}
  before_script:
    - apk add --no-cache github-cli
  script:
    # Append Docker images section to release notes
    - |
      cat >> artifacts/RELEASE_NOTES.md << 'EOF'

      ## Docker Images

      | Image | DockerHub | GHCR |
      |-------|-----------|------|
      | API | `rbaumier/hook0-api:${VERSION}` | `ghcr.io/rbaumier/hook0-api:${VERSION}` |
      | Worker | `rbaumier/output-worker:${VERSION}` | `ghcr.io/rbaumier/output-worker:${VERSION}` |

      ```bash
      # Pull from DockerHub
      docker pull rbaumier/hook0-api:${VERSION}
      docker pull rbaumier/output-worker:${VERSION}

      # Pull from GHCR
      docker pull ghcr.io/rbaumier/hook0-api:${VERSION}
      docker pull ghcr.io/rbaumier/output-worker:${VERSION}
      ```
      EOF
    - sed -i "s/\${VERSION}/$VERSION/g" artifacts/RELEASE_NOTES.md
    - echo "=== Creating GitHub Release ==="
    - gh release create $CI_COMMIT_TAG --repo rbaumier/hook0-release-test --title "Release $CI_COMMIT_TAG" --notes-file artifacts/RELEASE_NOTES.md artifacts/*
